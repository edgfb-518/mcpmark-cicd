name: Get v1.0.0 Milestone Number

on: push

jobs:
  get-milestone:
    runs-on: ubuntu-latest
    steps:
      - name: Get milestone number
        uses: actions/github-script@v7
        with:
          script: |
            const { github, context } = require('@actions/github');
            const repo = context.repo;

            // List all milestones to find v1.0.0
            const { data: milestones } = await github.rest.issues.listMilestones({ ...repo });
            const v1Milestone = milestones.find(m => m.title === "v1.0.0");
            if (v1Milestone) {
              console.log(`v1.0.0 milestone number is ${v1Milestone.number}`);
            } else {
              console.log("v1.0.0 milestone not found");
            }